name: CI/CD Pipeline Build Check & Deploy

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: VALIDATE BACKEND ---
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Forces commands to run inside /backend
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json' # Fixes the missing lockfile error

      - name: Install Application Dependencies
        run: npm ci || npm install

      - name: Lint Verification Run
        run: npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  # --- JOB 2: VALIDATE FRONTEND ---
  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Forces commands to run inside /frontend
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # Fixes the missing lockfile error

      - name: Install Application Dependencies
        run: npm ci || npm install

      - name: Lint Verification Run
        run: npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  # --- JOB 3: BUILD AND SHIP DOCKER IMAGES ---
  build-and-ship:
    needs: [validate-backend, validate-frontend] # Only runs if BOTH subfolders pass testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FRONTEND BUILD (Uses context: ./frontend)
      - name: Build and Push Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Points Docker to the frontend folder
          file: ./frontend/Dockerfile # Points to frontend Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.BACKEND_IP }}:5000

      # BACKEND BUILD (Uses context: ./backend)
      - name: Build and Push Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Points Docker to the backend folder
          file: ./backend/Dockerfile # Points to backend Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
