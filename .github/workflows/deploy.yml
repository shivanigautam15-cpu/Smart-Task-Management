name: CI/CD Pipeline Build Check & Deploy

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: VALIDATE BACKEND ---
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24 # Upgraded to the latest production-standard LTS release

      - name: Install Application Dependencies
        run: npm install # Dynamically resolves packages inside the subdirectory

      - name: Lint Verification Run
        run: npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  # --- JOB 2: VALIDATE FRONTEND ---
  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Application Dependencies
        run: npm install

      - name: Lint Verification Run
        run: npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  # --- JOB 3: BUILD AND SHIP DOCKER IMAGES ---
  build-and-ship:
    needs: [validate-backend, validate-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FRONTEND BUILD
      - name: Build and Push Frontend Container
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.BACKEND_IP }}:5000

      # BACKEND BUILD
      - name: Build and Push Backend Container
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
